<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonorTrack — Every Donor. Every Gift. One Place.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal: #1F5C5C;
    --teal-dark: #184A4A;
    --ink: #111111;
    --gray: #6B6B6B;
    --border: #D9D9D9;
    --bg-footer-page: #F2F2F0;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #ffffff;
  }

  a{ color:inherit; text-decoration:none; }

  /* ---------- Header ---------- */
  header{
    background: var(--teal);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 20px 64px;
  }

  .logo{
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: #ffffff;
    border: 2px solid #1D4ED8;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .logo svg{ width: 34px; height: 34px; }

  nav{ display:flex; gap: 40px; }

  nav a{
    color:#ffffff;
    font-size: 16px;
    font-weight: 500;
    opacity:0.95;
    transition: opacity 0.15s ease;
  }
  nav a:hover{ opacity: 0.7; }

  /* ---------- Hero ---------- */
  .hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 40px;
    padding: 110px 64px 110px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .hero-copy{ max-width: 560px; }

  .hero-copy h1{
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.5px;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .hero-copy p{
    font-size: 22px;
    line-height: 1.5;
    color: #737373;
    font-weight: 400;
    margin-bottom: 32px;
  }

  .cta-row{
    display:flex;
    gap: 14px;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding: 14px 26px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor:pointer;
    border: 1px solid transparent;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn:focus-visible{ outline: 3px solid #1D4ED8; outline-offset: 2px; }

  .btn-primary{
    background: #0A0A0A;
    color:#ffffff;
  }
  .btn-primary:hover{ background:#000000; }

  .btn-secondary{
    background: #ffffff;
    color: var(--ink);
    border-color: var(--border);
  }
  .btn-secondary:hover{ background:#fafafa; }

  .hero-art{
    flex-shrink: 0;
    width: 480px;
    max-width: 44vw;
  }
  .hero-art svg{ width: 100%; height: auto; display:block; }

  /* ---------- Stats footer ---------- */
  .stats{
    background: var(--teal);
    padding: 64px 64px 72px;
  }

  .stats-inner{
    max-width: 1400px;
    margin: 0 auto;
    display:flex;
    gap: 96px;
    padding-left: 72px;
  }

  .stat-label{
    color: #ffffff;
    font-family:'Poppins', sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin-bottom: 14px;
  }

  .stat-value{
    color: #ffffff;
    font-family:'Poppins', sans-serif;
    font-weight: 800;
    font-size: 34px;
  }

  .page-footer-spacer{
    height: 24px;
    background: var(--bg-footer-page);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px){
    header{ padding: 18px 24px; }
    nav{ gap: 22px; }
    .hero{
      flex-direction: column-reverse;
      text-align:center;
      padding: 56px 24px;
    }
    .hero-copy{ max-width: 100%; }
    .hero-copy h1{ font-size: 44px; }
    .hero-copy p{ font-size: 18px; }
    .cta-row{ justify-content:center; flex-wrap:wrap; }
    .hero-art{ width: 320px; max-width: 80vw; }
    .stats-inner{ flex-direction:column; gap: 32px; padding-left: 8px; }
  }

  @media (prefers-reduced-motion: reduce){
    .btn{ transition:none; }
  }
</style>
</head>
<body>

  <header>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="7" r="2.4" fill="#1D4ED8"/>
        <circle cx="6.5" cy="10.5" r="2" fill="#2E9E5B"/>
        <circle cx="17.5" cy="10.5" r="2" fill="#2E9E5B"/>
        <path d="M12 9.4V16M12 16C10.5 16 9 17 9 19M12 16C13.5 16 15 17 15 19" stroke="#2E9E5B" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M6.5 12.5C6.5 14 7.5 15 9 15.4M17.5 12.5C17.5 14 16.5 15 15 15.4" stroke="#1D4ED8" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <nav>
      <a href="#resources">Resources</a>
      <a href="#about">About Us</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-copy">
      <h1>DonorTrack</h1>
      <p>Every Donor. Every Gift.<br>One Place.</p>
      <div class="cta-row">
        <a class="btn btn-primary" href="#register">Register</a>
        <a class="btn btn-secondary" href="#campaigns">Recent Campaigns</a>
      </div>
    </div>

    <div class="hero-art" aria-hidden="true">
      <svg viewBox="0 0 480 420" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- box shadow -->
        <ellipse cx="240" cy="392" rx="150" ry="14" fill="#00000010"/>

        <!-- donation box -->
        <g stroke="#111111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
          <path d="M110 260 L240 210 L370 260 L370 380 L110 380 Z" fill="#D7D7E0"/>
          <path d="M110 260 L240 210 L370 260 L240 310 Z" fill="#C4C4D2"/>
          <path d="M180 254 L300 254" />
          <text x="240" y="350" font-family="Poppins, sans-serif" font-weight="700" font-size="30" fill="#1A1A1A" text-anchor="middle" stroke="none">DONATIONS</text>
        </g>

        <!-- motion lines -->
        <g stroke="#111111" stroke-width="2.5" stroke-linecap="round">
          <line x1="60" y1="230" x2="90" y2="215"/>
          <line x1="45" y1="270" x2="80" y2="265"/>
          <line x1="400" y1="200" x2="425" y2="185"/>
          <line x1="415" y1="240" x2="445" y2="235"/>
          <line x1="330" y1="150" x2="345" y2="125"/>
          <line x1="150" y1="150" x2="140" y2="125"/>
        </g>

        <!-- hand 1: dollar bill (left) -->
        <g stroke="#111111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
          <rect x="55" y="145" width="60" height="90" rx="18" fill="#A9CBE0" transform="rotate(-18 55 145)"/>
          <path d="M95 195 C120 200 150 215 165 235 C178 250 172 265 155 260 C130 253 105 235 90 220" fill="#F6C9A0"/>
          <rect x="115" y="220" width="80" height="46" rx="4" fill="#7EBF5B" transform="rotate(18 115 220)"/>
        </g>

        <!-- hand 2: heart (top) -->
        <g stroke="#111111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
          <rect x="215" y="55" width="56" height="86" rx="16" fill="#F0BE5A"/>
          <path d="M235 120 C215 125 190 150 185 175 C180 198 200 205 218 190 C232 178 245 155 245 135" fill="#F6C9A0"/>
          <path d="M195 205 C185 190 195 172 212 172 C220 172 226 178 228 184 C230 178 236 172 244 172 C261 172 271 190 261 205 C251 218 228 232 228 232 C228 232 205 218 195 205 Z" fill="#E2544A"/>
        </g>

        <!-- hand 3: card (right) -->
        <g stroke="#111111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
          <rect x="360" y="150" width="58" height="88" rx="16" fill="#E8895B" transform="rotate(14 360 150)"/>
          <path d="M340 205 C320 200 295 190 280 178 C268 168 274 154 291 158 C312 163 335 175 348 188" fill="#F6C9A0"/>
          <rect x="272" y="150" width="70" height="46" rx="5" fill="#FFFFFF" transform="rotate(-16 272 150)"/>
          <rect x="284" y="163" width="16" height="12" rx="2" fill="#F0BE5A" transform="rotate(-16 284 163)"/>
        </g>
      </svg>
    </div>
  </section>

  <section class="stats">
    <div class="stats-inner">
      <div>
        <div class="stat-label">Total Donors:</div>
        <div class="stat-value">420</div>
      </div>
      <div>
        <div class="stat-label">Amount Raised:</div>
        <div class="stat-value">$69,000</div>
      </div>
    </div>
  </section>

  <div class="page-footer-spacer"></div>

</body>
</html>
