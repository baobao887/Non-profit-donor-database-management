<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonorTrack | Campaigns</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-slate-50 text-slate-900" data-page="campaigns.html">
  <div class="min-h-screen flex">
    <div id="sidebar-root"></div>
    <main class="flex-1 px-6 py-6">
      <header class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div>
          <p class="text-sm text-slate-500">Campaigns / Active launches</p>
          <h2 class="text-3xl font-semibold tracking-tight">Campaign showcase</h2>
        </div>
        <button type="button" id="openAddCampaign" class="btn-primary px-5 py-3 rounded-2xl bg-sky-600 text-white">Start campaign</button>
      </header>
      <section id="campaigns-grid" class="grid gap-6 mb-8 md:grid-cols-2 xl:grid-cols-3"></section>
      <section class="grid gap-6 xl:grid-cols-[1.6fr_1fr]">
        <div class="card-glass p-6 shadow-xl">
          <h3 class="text-xl font-semibold mb-5">Active campaign metrics</h3>
          <canvas id="campaignLineChart" class="chart-canvas" height="190"></canvas>
        </div>
        <div class="card-glass p-6 shadow-xl">
          <h3 class="text-xl font-semibold mb-5">Status breakdown</h3>
          <div class="space-y-4">
            <div class="rounded-3xl bg-sky-50 p-4"><p class="text-slate-600 text-sm">Live campaigns</p><p class="text-3xl font-semibold" id="insight-live">—</p></div>
            <div class="rounded-3xl bg-slate-50 p-4"><p class="text-slate-600 text-sm">Campaign goal on target</p><p class="text-3xl font-semibold" id="insight-target">—</p></div>
            <div class="rounded-3xl bg-slate-50 p-4"><p class="text-slate-600 text-sm">Upcoming launches</p><p class="text-3xl font-semibold" id="insight-upcoming">—</p></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div id="campaignModal" class="modal">
    <div class="modal-backdrop" data-close-modal="campaignModal"></div>
    <div class="modal-panel" role="dialog">
      <h3 class="text-xl font-semibold mb-5">New campaign</h3>
      <form id="campaignForm">
        <div class="form-field"><label for="campaignName">Campaign name</label><input id="campaignName" class="input-glass" required /></div>
        <div class="form-field"><label for="campaignDesc">Description</label><textarea id="campaignDesc" class="input-glass" rows="3" required></textarea></div>
        <div class="grid grid-cols-2 gap-4">
          <div class="form-field"><label for="campaignGoal">Goal (₱)</label><input id="campaignGoal" type="number" min="1000" step="0.01" class="input-glass" required /></div>
          <div class="form-field"><label for="campaignStatus">Status</label>
            <select id="campaignStatus" class="input-glass"><option>Live</option><option>Planning</option><option>Paused</option></select>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button type="submit" class="btn-primary flex-1 py-3 rounded-2xl">Create</button>
          <button type="button" data-close-modal="campaignModal" class="btn-secondary flex-1 py-3 rounded-2xl">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="assets/js/pages/campaigns.js"></script>
</body>
</html>
